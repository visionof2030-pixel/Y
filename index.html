<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player Pro</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  font-family: Arial;
  display: flex;
  height: 100vh;
  color: white;
}

/* sidebar */
#sidebar {
  width: 260px;
  background: #111;
  overflow-y: auto;
  padding: 10px;
}

.channel {
  padding: 12px;
  margin: 6px 0;
  background: #1c1c1c;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.2s;
}

.channel:hover {
  background: #2a2a2a;
}

/* player */
#playerContainer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="playerContainer">
  <video
    id="player"
    class="video-js vjs-default-skin"
    controls
    autoplay
    style="width:100%;max-width:900px;"
  ></video>
</div>

<script>
var player = videojs('player');

// 🎯 القنوات (حط أي روابط عندك هنا)
const channels = [
  {
    name: "Channel 1",
    url: "http://gazalone.life:8080/live/omar777/01103978590/460864.ts"
  },
  {
    name: "Test Channel",
    url: "http://amir11.bounceme.net:8080/YZjwcwnLjh/QlXrgJTnED/1127"
  }
];

// عرض القنوات
const sidebar = document.getElementById("sidebar");

channels.forEach(ch => {
  const div = document.createElement("div");
  div.className = "channel";
  div.innerText = ch.name;

  div.onclick = () => {
    playChannel(ch.url);
  };

  sidebar.appendChild(div);
});

// تشغيل القناة
function playChannel(url) {
  player.src({
    src: url,
    type: "video/mp4" // يعمل مع TS غالبًا
  });

  player.ready(function () {
    player.play().catch(()=>{});
  });
}

// تشغيل أول قناة تلقائي
playChannel(channels[0].url);
</script>

</body>
</html>
