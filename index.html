<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPTV FFmpeg Player</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
video { width:100%; max-width:900px; }
</style>
</head>

<body>

<video id="player" class="video-js vjs-default-skin" controls autoplay></video>

<script>
var player = videojs('player');

player.src({
  src: "https://y-gl8p.onrender.com/stream.m3u8",
  type: "application/x-mpegURL"
});

player.play();
</script>

</body>
</html>
